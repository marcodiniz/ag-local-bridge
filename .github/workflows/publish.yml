name: Publish to Open VSX

on:
  push:
    branches: [master, beta]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

  publish:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install ovsx
        run: npm install -g ovsx @vscode/vsce

      - name: Auto-version (1.1.{run_number})
        run: |
          VERSION="1.1.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          npm version "$VERSION" --no-git-tag-version
          echo "📦  Version: $VERSION"

      - name: Package extension
        run: |
          if [ "${{ github.ref }}" = "refs/heads/beta" ]; then
            vsce package --pre-release
          else
            vsce package
          fi

      - name: Publish to Open VSX
        run: |
          echo "Publishing version $VERSION..."
          if [ "${{ github.ref }}" = "refs/heads/beta" ]; then
            ovsx publish *.vsix -p ${{ secrets.OPEN_VSX_TOKEN }} --pre-release 2>&1 || {
              echo "::error::ovsx publish pre-release failed. Check that OPEN_VSX_TOKEN secret is set and valid."
              exit 1
            }
          else
            ovsx publish *.vsix -p ${{ secrets.OPEN_VSX_TOKEN }} 2>&1 || {
              echo "::error::ovsx publish failed. Check that OPEN_VSX_TOKEN secret is set and valid."
              exit 1
            }
          fi
